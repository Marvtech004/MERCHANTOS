version: '3.9'

services:
  merchantos-db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: merchantos
      POSTGRES_PASSWORD: merchantos123
      POSTGRES_DB: merchantos
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.example
    ports:
      - '4000:4000'
    depends_on:
      - merchantos-db

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    restart: unless-stopped
    ports:
      - '3000:4173'
    depends_on:
      - backend

  nginx:
    image: nginx:stable-alpine
    restart: unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  db_data:
